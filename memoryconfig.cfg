SYMBOLS {
    __TAPECUST__:       type = import;
    __PROGFLAG__:       type = weak, value = $80; # $00=BASIC, $80=machine code
    __AUTORUN__:        type = weak, value = $C7; # $00=only load, $C7=run
    __OVERLAYSIZE__:    type = weak, value = $2000; # Size needed for largest overlay
    __STACKSIZE__:      type = weak, value = $1000; # 4K stack
    __GRAB__:           type = weak, value = 1; # 0=don't grab graphics RAM, 1=grab graphics RAM
    __RAMEND__:         type = weak, value = $9800 + $1C00 * __GRAB__ - __OVERLAYSIZE__;
}
MEMORY {
    ZP:      file = "", define = yes, start = $0050,            size = $0040;
    TAPEHDR: file = %O, type   = ro,  start = $0000,            size = $001F;
    MAIN:    file = %O, define = yes, start = $0400, size = __RAMEND__ - __MAIN_START__;
    BSS:     file = "",               start = __ONCE_RUN__,     size = __RAMEND__ - __STACKSIZE__ - __ONCE_RUN__;
    OVL1:    file = "BUILD/OricScreenEditor/OSEforLOCI-Overlay1.bin", start = __RAMEND__ , size = __OVERLAYSIZE__;
    OVL2:    file = "BUILD/OricScreenEditor/OSEforLOCI-Overlay2.bin", start = __RAMEND__ , size = __OVERLAYSIZE__;
    OVL3:    file = "BUILD/OricScreenEditor/OSEforLOCI-Overlay3.bin", start = __RAMEND__ , size = __OVERLAYSIZE__;
}
SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    TAPEHDR:  load = TAPEHDR, type = ro;
    STARTUP:  load = MAIN,    type = ro;
    LOWCODE:  load = MAIN,    type = ro,  optional = yes;
    CODE:     load = MAIN,    type = ro;
    RODATA:   load = MAIN,    type = ro;
    DATA:     load = MAIN,    type = rw;
    INIT:     load = MAIN,    type = rw;  # uninitialized, but reserves output space
    ONCE:     load = MAIN,    type = ro,  define   = yes;
    BSS:      load = BSS,     type = bss, define   = yes;
    OVERLAY1: load = OVL1,     type = ro,  define = yes, optional = yes;
    OVERLAY2: load = OVL2,     type = ro,  define = yes, optional = yes;
    OVERLAY3: load = OVL3,     type = ro,  define = yes, optional = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
